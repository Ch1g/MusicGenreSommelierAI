services:
  web-proxy:
    build:
      context: ./web-proxy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web-proxy/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - app-network

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    volumes:
      - ./app:/src
    env_file:
      - ./app/.env
    networks:
      - app-network

  message-broker:
    restart: always
    build:
      context: ./mb
      dockerfile: Dockerfile
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    env_file:
      - ./mb/.env
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network

  database:
    build:
      context: ./db
      dockerfile: Dockerfile
    env_file:
      - ./db/.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data: