services:
  web-proxy:
    build:
      context: ./web-proxy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web-proxy/conf.d:/etc/nginx/conf.d:r
    depends_on:
      - app
      - frontend
    networks:
      - app-network

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    volumes:
      - ./app:/src
      - file-storage:/src/storage
    env_file:
      - .db.env
      - .app.env
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/src
      - /app/node_modules
    networks:
      - app-network

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    volumes:
      - ./app/music_genre_sommelier:/src/music_genre_sommelier
      - file-storage:/src/storage
    env_file:
      - .db.env
    depends_on:
      - database
      - message-broker
    networks:
      - app-network
    deploy:
      replicas: 2

  message-broker:
    image: rabbitmq:4.2-management-alpine
    command: rabbitmq-server
    restart: on-failure
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network

  database:
    image: postgres:18.3-alpine3.23
    command: postgres
    env_file:
      - .db.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  file-storage:
