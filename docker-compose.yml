services:
  web-proxy:
    build:
      context: ./web-proxy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web-proxy/conf.d:/etc/nginx/conf.d:r
    depends_on:
      - app
    networks:
      - app-network

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    volumes:
      - ./app:/src
    env_file:
      - .db.env
    networks:
      - app-network

  message-broker:
    image: rabbitmq:4.2-management-alpine
    command: rabbitmq-server
    restart: on-failure
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network

  database:
    image: postgres:18.3-alpine3.23
    command: postgres
    env_file:
      - .db.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
